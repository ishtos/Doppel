name: doppel
description: AI Shadowing Coach - シャドーイングを加速するAIコーチ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  # Routing
  go_router: ^14.3.0

  # Data Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local DB
  hive_ce: ^2.7.0
  hive_ce_flutter: ^2.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Audio
  just_audio: ^0.9.40
  record: ^5.1.2

  # AI / Speech
  http: ^1.2.2

  # Charts
  fl_chart: ^0.69.0

  # Utilities
  path_provider: ^2.1.4
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  build_runner: ^2.4.12
  hive_ce_generator: ^1.6.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
